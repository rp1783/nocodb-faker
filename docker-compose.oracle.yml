version: '3.8'

services:
  # NoCoDB Database
  nocodb:
    image: nocodb/nocodb:latest
    container_name: nocodb
    environment:
      - NC_DB=pg://nocodb_network:nocodb_password@postgres:5432/nocodb
      - NC_AUTH_JWT_SECRET=${NC_AUTH_JWT_SECRET}
    ports:
      - "8091:8080"
    volumes:
      - nocodb_data:/usr/app/data
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - nocodb-network

  # PostgreSQL for NoCoDB
  postgres:
    image: postgres:15-alpine
    container_name: nocodb_postgres
    environment:
      - POSTGRES_USER=nocodb_network
      - POSTGRES_PASSWORD=nocodb_password
      - POSTGRES_DB=nocodb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - nocodb-network

  # Your API Wrapper
  nocodb-api:
    build: .
    container_name: nocodb-api
    ports:
      - "3000:3000"
    environment:
      - NOCODB_URL=http://nocodb:8080
      - NOCODB_API_TOKEN=${NOCODB_API_TOKEN}
      - TABLE_ID=${TABLE_ID}
      - EMPLOYEES_TABLE_ID=${EMPLOYEES_TABLE_ID}
      - VEHICLES_TABLE_ID=${VEHICLES_TABLE_ID}
      - CASES_TABLE_ID=${CASES_TABLE_ID}
      - NUM_CONTACTS=${NUM_CONTACTS:-100}
      - NUM_EMPLOYEES=${NUM_EMPLOYEES:-20}
      - NUM_VEHICLES=${NUM_VEHICLES:-50}
      - NUM_CASES=${NUM_CASES:-30}
      - API_PORT=${API_PORT:-3000}
      - NOCODB_WRAPPER_API_KEY=${NOCODB_WRAPPER_API_KEY}
    depends_on:
      - nocodb
    restart: unless-stopped
    networks:
      - nocodb-network

  # Nginx Proxy Manager
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    ports:
      - '80:80'      # Public HTTP Port
      - '443:443'    # Public HTTPS Port
      - '81:81'      # Admin Web Port
    environment:
      - DB_SQLITE_FILE=/data/database.sqlite
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    restart: unless-stopped
    networks:
      - nocodb-network

volumes:
  nocodb_data:
  postgres_data:
  npm_data:
  npm_letsencrypt:

networks:
  nocodb-network:
    driver: bridge
